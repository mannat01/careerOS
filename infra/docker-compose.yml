# CareerOS — local dev stack (M01). Brings up the infra Fable stubbed.
# Usage: docker compose -f infra/docker-compose.yml up -d
services:
  postgres:
    image: pgvector/pgvector:pg16   # Postgres 16 + pgvector preinstalled
    environment:
      POSTGRES_USER: careeros
      POSTGRES_PASSWORD: careeros
      POSTGRES_DB: careeros
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init/enable-pgvector.sql:/docker-entrypoint-initdb.d/10-pgvector.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U careeros -d careeros"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports: ["6379:6379"]
    volumes: ["redisdata:/data"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:                              # S3-compatible object storage (resume renders, exports)
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: careeros
      MINIO_ROOT_PASSWORD: careeros-secret
    ports: ["9000:9000", "9001:9001"]
    volumes: ["miniodata:/data"]
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  createbucket:                       # one-shot: ensure the artifacts bucket exists
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 careeros careeros-secret &&
      mc mb --ignore-existing local/careeros-artifacts &&
      echo 'bucket ready'"

volumes:
  pgdata:
  redisdata:
  miniodata:
